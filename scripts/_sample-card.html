<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link href="fonts-embed.css" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050812; }

  /* mirrors CelebrationCard.module.css, with cqw resolving against the 1280px card */
  .shareCard {
    --white: #ffffff;
    --w2: rgba(255, 255, 255, 0.62);
    --w3: rgba(255, 255, 255, 0.3);
    --blue: #3b82f6;
    --blue3: #5eb0ff;
    --navy: #050812;
    --rp: 100px;
    --font-syne: "Syne";
    --font-inter: "Inter";
    --font-outfit: "Outfit";

    position: relative;
    width: 1280px;
    height: 720px;
    border-radius: 18px;
    overflow: hidden;
    background: var(--navy);
    font-family: var(--font-inter), "Inter", sans-serif;
    -webkit-font-smoothing: antialiased;
    container-type: inline-size;
  }
  .shareRefImg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0; display: block;
  }
  .shareTextMask {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(90deg, var(--navy) 0%, var(--navy) 43%,
      rgba(5,8,18,0.98) 49%, rgba(5,8,18,0.7) 57%, transparent 65%);
  }
  .shareFooterMask {
    position: absolute; left: 0; right: 0; bottom: 0; height: 12%; z-index: 1; pointer-events: none;
    background: linear-gradient(0deg, var(--navy) 35%, rgba(5,8,18,0.94) 65%, transparent 100%);
  }
  .shareInner {
    position: absolute; inset: 0; z-index: 2;
    padding: 7.2% 0 0 4.8%; display: flex; flex-direction: column;
  }
  .shareCol { width: 58%; display: flex; flex-direction: column; }
  .shareBrand {
    font-weight: 800; font-size: 2.35cqw; letter-spacing: 0.5cqw;
    color: var(--white); text-transform: uppercase; line-height: 1;
  }
  .shareWon {
    width: fit-content; max-width: 100%;
    font-family: var(--font-syne), "Syne", sans-serif; font-weight: 800;
    font-size: 10.8cqw; line-height: 0.88; letter-spacing: -0.08cqw;
    text-transform: uppercase; margin: 1.1cqw 0 0;
    background: linear-gradient(180deg, #ffffff 0%, #e8f0ff 28%, #a8c8ff 55%, #5b9aff 78%, var(--blue) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0.45cqw 1.1cqw rgba(59,130,246,0.5));
  }
  .shareUser { display: flex; align-items: center; gap: 1.5cqw; margin-top: 3.6cqw; }
  .shareAv {
    width: 4.8cqw; height: 4.8cqw; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    background: #2a3348; display: flex; align-items: center; justify-content: center;
    font-size: 2.1cqw; font-weight: 700; color: var(--white); border: 0.22cqw solid var(--blue);
  }
  .shareHandle { font-size: 3.65cqw; font-weight: 700; color: var(--white); letter-spacing: -0.08cqw; }
  .shareMeta { display: flex; gap: 1.1cqw; margin-top: 1.65cqw; }
  .shareChip {
    font-size: 2.05cqw; font-weight: 700; min-height: 4.15cqw; padding: 0 2.15cqw;
    border-radius: var(--rp); background: transparent; border: 0.14cqw solid rgba(59,130,246,0.75);
    color: var(--white); white-space: nowrap; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .shareChipDay {
    background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14);
    font-family: var(--font-outfit), "Outfit", sans-serif; font-weight: 600; letter-spacing: 0.02cqw;
  }
  .sharePayout {
    margin-top: 3.4cqw; padding: 2.2cqw 2.6cqw; border-radius: 1.8cqw;
    background: #080d18; border: 0.14cqw solid rgba(59,130,246,0.38); max-width: 94%;
  }
  .spLabel {
    font-size: 1.9cqw; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14cqw;
    color: var(--blue3); margin-bottom: 1.25cqw; line-height: 1;
    text-shadow: 0 0 0.6cqw rgba(59,130,246,0.3);
  }
  .shareAmtBnb {
    font-weight: 800; font-size: 7.2cqw; line-height: 1.1; color: var(--white);
    letter-spacing: -0.18cqw; font-variant-numeric: tabular-nums;
    display: flex; align-items: center; flex-wrap: wrap; gap: 0.45cqw;
  }
  .shareAmtUnit {
    font-size: 3cqw; color: var(--blue3); font-weight: 700; line-height: 1;
    letter-spacing: 0.1cqw; text-transform: uppercase; text-shadow: 0 0 0.8cqw rgba(59,130,246,0.35);
  }
  .shareAmtUsd {
    font-family: var(--font-outfit), "Outfit", sans-serif; font-size: 2.05cqw; font-weight: 600;
    color: var(--w2); margin-top: 1.5cqw; display: block; line-height: 1.3; letter-spacing: 0.02cqw;
  }
  .shareTag {
    position: absolute; left: 0; right: 0; bottom: 2.6%; text-align: center;
    font-size: 2.05cqw; font-weight: 600; color: var(--w3); letter-spacing: 0.08cqw; z-index: 3;
  }
</style>
</head>
<body>
  <div class="shareCard" id="share-card">
    <img class="shareRefImg" src="../public/winner-card-ref.png" alt="" />
    <div class="shareTextMask"></div>
    <div class="shareFooterMask"></div>
    <div class="shareInner">
      <div class="shareCol">
        <div class="shareBrand">MUNDIAL</div>
        <div class="shareWon">WINNER</div>
        <div class="shareUser">
          <div class="shareAv">XN</div>
          <div class="shareHandle">@xnovamercury</div>
        </div>
        <div class="shareMeta">
          <span class="shareChip">Tier 3</span>
          <span class="shareChip shareChipDay">Yesterday · Jun 15</span>
        </div>
        <div class="sharePayout">
          <div class="spLabel">PRIZE WON</div>
          <div class="shareAmtBnb">49.07<span class="shareAmtUnit">USDC</span></div>
          <div class="shareAmtUsd">paid on Solana</div>
        </div>
      </div>
    </div>
    <div class="shareTag">mundial · predict &amp; win daily</div>
  </div>
</body>
</html>
